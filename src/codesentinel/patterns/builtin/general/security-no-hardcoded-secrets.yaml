apiVersion: v1
kind: Pattern
metadata:
  name: security-no-hardcoded-secrets
  category: security
  severity: critical
  tags:
    - security
    - secrets
    - credentials
  confidence_threshold: 0.85
spec:
  description: >
    No Hardcoded Secrets — source code must not contain hardcoded API keys,
    passwords, tokens, private keys, or other credentials. Secrets must be
    loaded from environment variables or a secret manager.
  rationale: >
    Hardcoded secrets in source code are one of the most common and dangerous
    security vulnerabilities. They get committed to version control, shared
    across environments, and are difficult to rotate. A leaked secret can
    lead to unauthorized access, data breaches, and compliance violations.
  applies_to:
    include:
      - "**/*.py"
      - "**/*.java"
      - "**/*.ts"
      - "**/*.js"
      - "**/*.go"
      - "**/*.rb"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"
    exclude:
      - "**/test/**"
      - "**/tests/**"
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/fixtures/**"
      - "**/examples/**"
  detection:
    positive_signals:
      - "variable named password, secret, api_key, token, or private_key assigned a string literal"
      - "string that looks like an API key (long alphanumeric, base64, or hex)"
      - "connection string with embedded credentials"
      - "hardcoded bearer token or authorization header value"
      - "private key material (BEGIN RSA PRIVATE KEY, BEGIN EC PRIVATE KEY)"
    negative_signals:
      - "value is loaded from environment variable (os.environ, process.env, System.getenv)"
      - "value is a placeholder like 'your-api-key-here' in documentation"
      - "value is an empty string or None/null used as a default"
      - "value is loaded from a secret manager or vault"
    context_clues:
      - "variable name suggests it holds a secret"
      - "value is used in authentication or authorization context"
      - "value is passed to an API client constructor"
  examples:
    correct:
      - description: "Secret loaded from environment variable"
        code: |
          import os

          API_KEY = os.environ["ANTHROPIC_API_KEY"]
          client = anthropic.Client(api_key=API_KEY)
      - description: "Secret loaded with fallback validation"
        code: |
          api_key = os.environ.get("API_KEY")
          if not api_key:
              raise ConfigError("API_KEY environment variable is required")
    incorrect:
      - description: "Hardcoded API key"
        code: |
          API_KEY = "sk-ant-api03-xYzAbCdEfGhIjKlMnOpQrStUvWxYz"
          client = anthropic.Client(api_key=API_KEY)
      - description: "Hardcoded password in connection string"
        code: |
          DATABASE_URL = "postgresql://admin:s3cretP@ss@db.example.com:5432/production"
      - description: "Hardcoded token in header"
        code: |
          headers = {"Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."}
  remediation: >
    Replace hardcoded secrets with environment variable lookups. Use a .env
    file for local development (never committed — add to .gitignore). In
    production, use a secret manager (AWS Secrets Manager, HashiCorp Vault,
    GCP Secret Manager). Validate at startup that required secrets are present.
    If a secret may have been committed, rotate it immediately.
  references:
    - title: "OWASP — Hardcoded Credentials"
      url: "https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password"
    - title: "CWE-798: Use of Hard-coded Credentials"
      url: "https://cwe.mitre.org/data/definitions/798.html"
