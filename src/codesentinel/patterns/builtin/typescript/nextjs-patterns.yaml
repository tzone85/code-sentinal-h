apiVersion: v1
kind: Pattern
metadata:
  name: nextjs-patterns
  category: frontend
  language: typescript
  severity: medium
  tags:
    - nextjs
    - data-fetching
    - routing
  confidence_threshold: 0.7
spec:
  description: >
    Next.js Patterns — use the appropriate data-fetching strategy
    (server components, server actions, or client-side fetching), respect
    the server/client component boundary, and avoid importing server-only
    code in client components.
  rationale: >
    Mixing server and client code in Next.js leaks secrets, increases
    bundle size, and creates hydration mismatches. Using client-side
    fetching where server components suffice wastes performance and SEO
    benefits that Next.js provides out of the box.
  applies_to:
    include:
      - "**/*.tsx"
      - "**/*.ts"
    exclude:
      - "**/test/**"
      - "**/tests/**"
      - "**/*.test.*"
  detection:
    positive_signals:
      - "'use client' component imports server-only module or accesses env var"
      - "client component makes API call that could be a server component data fetch"
      - "getServerSideProps used where static generation would suffice"
      - "large library imported in a client component unnecessarily"
    negative_signals:
      - "server component fetches data directly"
      - "'use client' used only for interactive components"
      - "server actions used for mutations"
    context_clues:
      - "'use client' directive at top of file"
      - "app/ directory routing structure"
      - "server component (default in app router)"
  examples:
    correct:
      - description: "Server component with direct data access"
        code: |
          // app/users/page.tsx (server component — no 'use client')
          import { db } from '@/lib/db';

          export default async function UsersPage() {
            const users = await db.user.findMany();
            return (
              <ul>
                {users.map(u => <li key={u.id}>{u.name}</li>)}
              </ul>
            );
          }
    incorrect:
      - description: "Client component fetching data that could be server-rendered"
        code: |
          'use client';
          import { useState, useEffect } from 'react';

          export default function UsersPage() {
            const [users, setUsers] = useState([]);
            useEffect(() => {
              fetch('/api/users').then(r => r.json()).then(setUsers);
            }, []);
            return <ul>{users.map(u => <li key={u.id}>{u.name}</li>)}</ul>;
          }
  remediation: >
    Use server components (the default in the app router) for data fetching
    and static content. Add 'use client' only for components that need
    interactivity (event handlers, state, browser APIs). Use server actions
    for form submissions and mutations.
  references:
    - title: "Next.js Docs — Server Components"
      url: "https://nextjs.org/docs/app/building-your-application/rendering/server-components"
